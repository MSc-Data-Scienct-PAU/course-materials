<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Contracts &amp; Tokens</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body { font-family: 'Outfit', sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; -webkit-font-smoothing: antialiased; }

.deck { width: 100vw; height: 100vh; position: relative; }

.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: none; padding: 64px 80px 80px 80px; }
.slide.active { display: flex; }

/* ===== LAYOUTS ===== */
.layout-center { flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.layout-split { flex-direction: row; align-items: center; }
.layout-split .text-side { flex: 1; padding-right: 64px; display: flex; flex-direction: column; justify-content: center; }
.layout-split .visual-side { flex: 1; display: flex; align-items: center; justify-content: center; }
.layout-top { flex-direction: column; justify-content: flex-start; padding-top: 72px; }

/* ===== TYPOGRAPHY ===== */
.title { font-weight: 700; font-size: 52px; line-height: 1.15; letter-spacing: -0.02em; color: #1a1a1a; }
.title-large { font-size: 64px; }
.subtitle { font-weight: 400; font-size: 20px; line-height: 1.65; color: #5f5f5f; margin-top: 20px; max-width: 560px; }
.label { font-weight: 600; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #1a73e8; margin-bottom: 16px; }
.era-dates { font-weight: 500; font-size: 15px; color: #999; margin-top: 4px; margin-bottom: 4px; }
.accent { color: #1a73e8; }

/* ===== COMPONENT LIST ===== */
.components { margin-top: 28px; display: flex; flex-direction: column; gap: 13px; max-width: 520px; }
.component-row { display: flex; align-items: flex-start; gap: 14px; }
.component-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 9px; flex-shrink: 0; }
.component-text { font-size: 16.5px; line-height: 1.5; color: #444; }
.component-text strong { color: #1a1a1a; font-weight: 600; }
.role-line { margin-top: 26px; font-size: 16px; color: #1a1a1a; }
.role-line strong { font-weight: 700; }

/* ===== HOOK ===== */
.hook-flow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 36px; }
.hook-word { font-size: 28px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em; }
.hook-arrow { color: #1a73e8; font-size: 22px; font-weight: 400; }

/* ===== DEFINITION CALLOUT ===== */
.definition { margin-top: 24px; padding: 22px 26px; background: #e8f0fe; border-left: 4px solid #1a73e8; border-radius: 8px; max-width: 540px; }
.definition .def-term { font-weight: 700; font-size: 17px; color: #1a73e8; margin-bottom: 6px; }
.definition .def-body { font-size: 17px; line-height: 1.55; color: #333; }
.definition .def-body strong { color: #1a1a1a; font-weight: 600; }

/* ===== TABLE ===== */
.cmp-table { margin-top: 32px; width: 100%; max-width: 960px; border-collapse: collapse; }
.cmp-table th { text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #999; padding: 0 18px 14px 18px; border-bottom: 1px solid #eee; }
.cmp-table td { font-size: 15.5px; color: #444; padding: 15px 18px; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
.cmp-table tr td:first-child { font-weight: 700; color: #1a1a1a; }
.type-tag { display: inline-flex; align-items: center; gap: 8px; }
.type-swatch { width: 10px; height: 10px; border-radius: 3px; }

/* ===== ROADMAP ===== */
.roadmap { margin-top: 30px; display: flex; flex-direction: column; gap: 16px; max-width: 600px; }
.roadmap-row { display: flex; align-items: flex-start; gap: 16px; }
.roadmap-badge { padding: 5px 12px; border-radius: 8px; background: #e8f0fe; color: #1a73e8; font-weight: 600; font-size: 12.5px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.roadmap-text { font-size: 16.5px; line-height: 1.55; color: #444; }
.roadmap-text strong { color: #1a1a1a; font-weight: 600; }
.closer { margin-top: 34px; padding-top: 24px; border-top: 1px solid #eee; font-size: 19px; font-weight: 500; color: #1a1a1a; font-style: italic; max-width: 600px; line-height: 1.5; }

/* ===== NAV ===== */
.nav { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100; }
.nav-counter { font-size: 13px; font-weight: 500; color: #999; }
.nav-dots { display: flex; gap: 6px; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.2s, width 0.2s; }
.nav-dot.active { background: #1a73e8; width: 20px; border-radius: 3px; }
.nav-btns { display: flex; gap: 4px; }
.nav-btn { width: 36px; height: 36px; border: 1px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { background: #f8f8f8; color: #1a1a1a; }

svg text { font-family: 'Outfit', sans-serif; }

.course-tag { position: fixed; top: 26px; right: 32px; z-index: 101; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #ccc; }

/* ===== LOGO ===== */
.logo-footer { position: fixed; top: 22px; left: 32px; z-index: 101; opacity: 0.55; }
.logo-footer img { height: 26px; width: auto; }
.title-logo { margin-bottom: 36px; }
.title-logo img { height: 54px; width: auto; }

/* ===== CODE BLOCK ===== */
.code-block {
  margin-top: 22px;
  background: #f6f8fc;
  border: 1px solid #e6ebf5;
  border-radius: 12px;
  padding: 20px 22px;
  font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
  font-size: 13.5px;
  line-height: 1.72;
  color: #3a4252;
  max-width: 560px;
  white-space: pre;
  overflow-x: auto;
}
.code-block .kw { color: #1a73e8; font-weight: 600; }
.code-block .ty { color: #2f9e44; }
.code-block .st { color: #d9822b; }
.code-block .cm { color: #a0a8b8; font-style: italic; }
.code-block .fn { color: #7c3aed; font-weight: 600; }
.code-block .muted { color: #9aa3b2; }

/* ===== CONTRACT SANDBOX ===== */
.sc { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 14px; }
.sc-card { border: 1.5px solid #e3ebf8; border-radius: 14px; overflow: hidden; }
.sc-head { background: #f4f7fc; padding: 12px 16px; font-weight: 700; font-size: 14px; color: #1a73e8; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e3ebf8; }
.sc-head .sc-supply { font-size: 12px; font-weight: 600; color: #777; font-family: 'SFMono-Regular', ui-monospace, monospace; }
.sc-balances { padding: 2px 16px; }
.bal-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f2f2f2; }
.bal-row:last-child { border-bottom: none; }
.bal-name { font-weight: 600; color: #1a1a1a; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.bal-name .you-tag { font-size: 10px; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 100px; font-weight: 700; letter-spacing: 0.04em; }
.bal-val { font-family: 'SFMono-Regular', ui-monospace, monospace; font-weight: 700; font-size: 16px; color: #1a73e8; font-variant-numeric: tabular-nums; border-radius: 6px; padding: 2px 8px; transition: background 0.5s; }
.bal-val.flash { background: #fff2bf; transition: background 0s; }

.sc-actions { display: flex; flex-direction: column; gap: 10px; }
.sc-action { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sc-fn { font-family: 'SFMono-Regular', ui-monospace, monospace; font-size: 13px; font-weight: 700; color: #7c3aed; min-width: 64px; }
.sc-input { width: 92px; font-family: 'Outfit', sans-serif; font-size: 14px; padding: 9px 11px; border: 1.5px solid #e3e3e3; border-radius: 9px; outline: none; }
.sc-input:focus { border-color: #1a73e8; }
.sc-select { font-family: 'Outfit', sans-serif; font-size: 14px; padding: 9px 11px; border: 1.5px solid #e3e3e3; border-radius: 9px; background: #fff; outline: none; cursor: pointer; }
.sc-btn { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; padding: 9px 18px; border: none; border-radius: 9px; background: #1a73e8; color: #fff; cursor: pointer; transition: filter 0.15s; }
.sc-btn:hover { filter: brightness(0.94); }
.sc-btn.ghost { background: #fff; color: #666; border: 1.5px solid #ddd; }
.sc-status { font-size: 14px; line-height: 1.5; padding: 11px 14px; border-radius: 10px; display: flex; gap: 9px; align-items: flex-start; }
.sc-status.neutral { background: #f6f6f6; color: #666; }
.sc-status.ok { background: #eafbef; color: #2f7d3f; }
.sc-status.revert { background: #fdeaea; color: #c0392b; }
.sc-status .s-mark { font-weight: 700; flex-shrink: 0; }
.sc-status .gas { margin-left: auto; white-space: nowrap; font-weight: 600; opacity: 0.85; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .slide { padding: 48px 32px 72px 32px; }
  .layout-split { flex-direction: column; }
  .layout-split .text-side { padding-right: 0; padding-bottom: 24px; }
  .title { font-size: 34px; }
  .title-large { font-size: 40px; }
  .cmp-table td, .cmp-table th { padding: 10px 8px; font-size: 13px; }
  .hook-word { font-size: 20px; }
  .sc, .code-block { max-width: 100%; }
}
</style>
</head>

  <img id="logoFooterImg" alt="Pan-Atlantic University" />

const deck = document.getElementById('deck');

slides.forEach((html, i) => {

  const slide = wrapper.firstElementChild;
  slide.classList.toggle('active', i === 0);
  slide.id = 'sl' + i;
  deck.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => go(i);

});

function go(i) {
  if (i < 0 || i >= TOTAL || i === cur) return;
  document.getElementById('sl' + cur).classList.remove('active');
  cur = i;
  document.getElementById('sl' + cur).classList.add('active');
  document.getElementById('logoFooter').style.display = (cur === 0) ? 'none' : 'block';
  document.querySelectorAll('.nav-dot').forEach((d,j) => d.classList.toggle('active', j === cur));
  document.getElementById('counter').textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('courseTag').textContent = 'Week 5 · ' + (cur+1) + '/' + TOTAL;
}

function next() { go(cur + 1); }
function prev() { go(cur - 1); }

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.tagName === 'SELECT')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => { let d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 50) d < 0 ? next() : prev(); });

// ============ CONTRACT SANDBOX ============
(function initContract() {
  const $ = id => document.getElementById(id);
  const balYou = $('balYou'), balAlice = $('balAlice'), balBob = $('balBob'), supplyEl = $('scSupply');
  const mintAmt = $('mintAmt'), xferTo = $('xferTo'), xferAmt = $('xferAmt');
  const btnMint = $('btnMint'), btnXfer = $('btnXfer'), reset = $('scReset');
  const status = $('scStatus'), statusText = $('scStatusText'), gasEl = $('scGas');
  if (!balYou) return;

  // illustrative gas costs (real gas is dynamic)
  const GAS_MINT = 51000, GAS_XFER = 35000, GAS_REVERT = 23000;

  const state = { You: 0, Alice: 0, Bob: 0, totalSupply: 0 };

  function render(flashKeys) {
    const map = { You: balYou, Alice: balAlice, Bob: balBob };
    for (const k in map) {
      map[k].textContent = state[k];
      if (flashKeys && flashKeys.includes(k)) {
        map[k].classList.remove('flash'); void map[k].offsetWidth; map[k].classList.add('flash');
      }
    }
    supplyEl.textContent = state.totalSupply;
  }

  function setStatus(kind, mark, text, gas) {
    status.className = 'sc-status ' + kind;
    statusText.innerHTML = text;
    status.querySelector('.s-mark').textContent = mark;
    gasEl.textContent = gas ? ('⛽ ' + gas.toLocaleString('en-US') + ' gas') : '';
  }

  btnMint.addEventListener('click', () => {
    const amt = Math.floor(Number(mintAmt.value));
    if (!Number.isFinite(amt) || amt <= 0) { setStatus('revert', '✗', 'Enter a positive amount to mint.', GAS_REVERT); return; }
    state.You += amt;
    state.totalSupply += amt;
    render(['You']);
    setStatus('ok', '✓', '<b>mint(' + amt + ')</b> — owner minted ' + amt + ' tokens. Supply is now ' + state.totalSupply + '.', GAS_MINT);
  });

  btnXfer.addEventListener('click', () => {
    const to = xferTo.value;
    const amt = Math.floor(Number(xferAmt.value));
    if (!Number.isFinite(amt) || amt <= 0) { setStatus('revert', '✗', 'Enter a positive amount to transfer.', GAS_REVERT); return; }
    if (state.You < amt) {
      setStatus('revert', '✗', '<b>revert: "balance too low"</b> — you hold ' + state.You + ', tried to send ' + amt + '. State unchanged, but gas still spent.', GAS_REVERT);
      return;
    }
    state.You -= amt;
    state[to] += amt;
    render(['You', to]);
    setStatus('ok', '✓', '<b>transfer(' + to + ', ' + amt + ')</b> — sent ' + amt + ' to ' + to + '. Event emitted.', GAS_XFER);
  });

  reset.addEventListener('click', () => {
    state.You = 0; state.Alice = 0; state.Bob = 0; state.totalSupply = 0;
    render();
    setStatus('neutral', '›', 'Contract reset. Call <b>mint</b> to create the first tokens.', 0);
    gasEl.textContent = '';
  });

  render();
})();
</script>
