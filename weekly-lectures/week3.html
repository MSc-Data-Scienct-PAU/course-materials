<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockchain &amp; Cryptography Core</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: #fff;
  color: #1a1a1a;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.deck { width: 100vw; height: 100vh; position: relative; }

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: none;
  padding: 64px 80px 80px 80px;
}

.slide.active { display: flex; }

/* ===== LAYOUTS ===== */
.layout-center {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.layout-split { flex-direction: row; align-items: center; }

.layout-split .text-side {
  flex: 1;
  padding-right: 64px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.layout-split .visual-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.layout-top {
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 72px;
}

/* ===== TYPOGRAPHY ===== */
.title {
  font-weight: 700;
  font-size: 52px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: #1a1a1a;
}

.title-large { font-size: 64px; }

.subtitle {
  font-weight: 400;
  font-size: 20px;
  line-height: 1.65;
  color: #5f5f5f;
  margin-top: 20px;
  max-width: 560px;
}

.label {
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #1a73e8;
  margin-bottom: 16px;
}

.era-dates {
  font-weight: 500;
  font-size: 15px;
  color: #999;
  margin-top: 4px;
  margin-bottom: 4px;
}

.accent { color: #1a73e8; }

/* ===== COMPONENT LIST ===== */
.components {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 13px;
  max-width: 520px;
}

.component-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.component-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-top: 9px;
  flex-shrink: 0;
}

.component-text {
  font-size: 16.5px;
  line-height: 1.5;
  color: #444;
}

.component-text strong { color: #1a1a1a; font-weight: 600; }

.role-line {
  margin-top: 26px;
  font-size: 16px;
  color: #1a1a1a;
}

.role-line strong { font-weight: 700; }

/* ===== HOOK ===== */
.hook-flow {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 36px;
}

.hook-word {
  font-size: 28px;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: -0.01em;
}

.hook-word.dim { color: #ccc; font-weight: 600; }

.hook-arrow { color: #1a73e8; font-size: 22px; font-weight: 400; }

/* ===== DEFINITION CALLOUT ===== */
.definition {
  margin-top: 24px;
  padding: 22px 26px;
  background: #e8f0fe;
  border-left: 4px solid #1a73e8;
  border-radius: 8px;
  max-width: 540px;
}

.definition .def-term {
  font-weight: 700;
  font-size: 17px;
  color: #1a73e8;
  margin-bottom: 6px;
}

.definition .def-body {
  font-size: 17px;
  line-height: 1.55;
  color: #333;
}

.definition .def-body strong { color: #1a1a1a; font-weight: 600; }

/* ===== TABLE ===== */
.cmp-table {
  margin-top: 32px;
  width: 100%;
  max-width: 960px;
  border-collapse: collapse;
}

.cmp-table th {
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
  padding: 0 18px 14px 18px;
  border-bottom: 1px solid #eee;
}

.cmp-table td {
  font-size: 15.5px;
  color: #444;
  padding: 16px 18px;
  border-bottom: 1px solid #f2f2f2;
  vertical-align: top;
}

.cmp-table tr td:first-child { font-weight: 700; color: #1a1a1a; }

.type-tag { display: inline-flex; align-items: center; gap: 8px; }
.type-swatch { width: 10px; height: 10px; border-radius: 3px; }

/* ===== ROADMAP ===== */
.roadmap {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
}

.roadmap-row { display: flex; align-items: flex-start; gap: 16px; }

.roadmap-badge {
  padding: 5px 12px;
  border-radius: 8px;
  background: #e8f0fe;
  color: #1a73e8;
  font-weight: 600;
  font-size: 12.5px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}

.roadmap-text { font-size: 16.5px; line-height: 1.55; color: #444; }
.roadmap-text strong { color: #1a1a1a; font-weight: 600; }

.closer {
  margin-top: 34px;
  padding-top: 24px;
  border-top: 1px solid #eee;
  font-size: 19px;
  font-weight: 500;
  color: #1a1a1a;
  font-style: italic;
  max-width: 600px;
  line-height: 1.5;
}

/* ===== NAV ===== */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}

.nav-counter { font-size: 13px; font-weight: 500; color: #999; }
.nav-dots { display: flex; gap: 6px; }

.nav-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ddd;
  cursor: pointer;
  transition: background 0.2s, width 0.2s;
}

.nav-dot.active { background: #1a73e8; width: 20px; border-radius: 3px; }

.nav-btns { display: flex; gap: 4px; }

.nav-btn {
  width: 36px; height: 36px;
  border: 1px solid #eee;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  color: #666;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn:hover { background: #f8f8f8; color: #1a1a1a; }

svg text { font-family: 'Outfit', sans-serif; }

/* ===== HASH PLAYGROUND ===== */
.pg {
  margin-top: 26px;
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.pg-field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 8px;
}

.pg-input {
  width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: 16px;
  padding: 14px 16px;
  border: 1.5px solid #e3e3e3;
  border-radius: 10px;
  background: #fafafa;
  color: #1a1a1a;
  resize: none;
  outline: none;
  transition: border-color 0.15s;
}

.pg-input:focus { border-color: #1a73e8; background: #fff; }

.pg-controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: stretch; }

.pg-select {
  flex: 1;
  min-width: 200px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 500;
  padding: 12px 14px;
  border: 1.5px solid #e3e3e3;
  border-radius: 10px;
  background: #fff;
  color: #1a1a1a;
  cursor: pointer;
  outline: none;
}

.pg-select:focus { border-color: #1a73e8; }

.pg-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 14.5px;
  font-weight: 600;
  padding: 12px 22px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: filter 0.15s, opacity 0.15s;
  white-space: nowrap;
}

.pg-btn:hover { filter: brightness(0.94); }

.pg-btn.gen { background: #1a73e8; color: #fff; }
.pg-btn.rev { background: #fff; color: #1a73e8; border: 1.5px solid #1a73e8; }

.pg-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  filter: none;
}

.pg-output {
  font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-all;
  padding: 16px;
  background: #f4f7fc;
  border: 1.5px solid #e3ebf8;
  border-radius: 10px;
  color: #1a1a1a;
  min-height: 58px;
}

.pg-output.empty { color: #bbb; font-style: italic; }

.pg-status {
  font-size: 14.5px;
  line-height: 1.5;
  padding: 12px 16px;
  border-radius: 10px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.pg-status.neutral { background: #f6f6f6; color: #666; }
.pg-status.ok { background: #eafbef; color: #2f7d3f; }
.pg-status.fail { background: #fdeaea; color: #c0392b; }

.pg-status .pg-mark { font-weight: 700; flex-shrink: 0; }

.pg-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 9px;
  border-radius: 100px;
  margin-left: 8px;
  vertical-align: middle;
}

.pg-tag.oneway { background: #e8f0fe; color: #1a73e8; }
.pg-tag.rev { background: #eafbef; color: #2f9e44; }

@media (max-width: 900px) {
  .pg { max-width: 100%; }
  .pg-controls { flex-direction: column; }
  .pg-select { min-width: 0; }
}

.course-tag {
  position: fixed;
  top: 26px;
  right: 32px;
  z-index: 101;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #ccc;
}

/* ===== LOGO ===== */
.logo-footer {
  position: fixed;
  top: 22px;
  left: 32px;
  z-index: 101;
  opacity: 0.55;
}

.logo-footer img { height: 26px; width: auto; }

.title-logo { margin-bottom: 36px; }
.title-logo img { height: 54px; width: auto; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .slide { padding: 48px 32px 72px 32px; }
  .layout-split { flex-direction: column; }
  .layout-split .text-side { padding-right: 0; padding-bottom: 24px; }
  .title { font-size: 34px; }
  .title-large { font-size: 40px; }
  .cmp-table td, .cmp-table th { padding: 10px 8px; font-size: 13px; }
  .hook-word { font-size: 20px; }
}
</style>
</head>

<div class="course-tag" id="courseTag">Week 3</div>

  <div class="nav-btns">
    <button class="nav-btn" onclick="prev()">←</button>
    <button class="nav-btn" onclick="next()">→</button>
  </div>
</div>

// ── 5: BLOCKS & THE CHAIN ──
`<div class="slide layout-split">
  <div class="text-side">
    <div class="label" style="color:${HASH};">Primitive 02 · Where Immutability Comes From</div>
    <div class="title">Blocks, Linked<br>by <span style="color:${HASH};">Hashes</span></div>
    <div class="subtitle" style="margin-top:12px;">Each block carries its data plus <strong style="color:#1a1a1a;">its own hash</strong> and <strong style="color:#1a1a1a;">the hash of the block before it</strong>. That backward reference is the "chain."</div>
    <div class="components">
      <div class="component-row"><div class="component-dot" style="background:${HASH};"></div><div class="component-text">A block = <strong>data + timestamp + own hash + previous hash</strong></div></div>
      <div class="component-row"><div class="component-dot" style="background:${HASH};"></div><div class="component-text">The chain starts at the <strong>genesis block</strong> (block #0)</div></div>
      <div class="component-row"><div class="component-dot" style="background:${NEG};"></div><div class="component-text"><strong>Tamper with any block</strong> → its hash changes → it no longer matches the "previous hash" in the next block</div></div>
      <div class="component-row"><div class="component-dot" style="background:${NEG};"></div><div class="component-text">The break is <strong>visible to everyone</strong> — and every later block breaks too</div></div>
    </div>
    <div class="role-line">This is <strong style="color:${HASH};">immutability</strong>: history is tamper-<em>evident</em> by design.</div>
  </div>
  <div class="visual-side">
    <svg viewBox="0 0 400 360" width="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
      ${(() => {
        let out = '';
        const blocks = [
          {y:30,  i:'0', ok:true},
          {y:130, i:'1', ok:true},
          {y:230, i:'2', ok:false}, // tampered
        ];
        blocks.forEach((b,idx) => {
          const c = b.ok ? HASH : NEG;
          out += '<rect x="90" y="'+b.y+'" width="220" height="80" rx="9" fill="'+c+'" opacity="0.09" stroke="'+c+'" stroke-width="1.6"/>';
          out += '<text x="106" y="'+(b.y+22)+'" font-size="12" font-weight="700" fill="'+c+'">BLOCK #'+b.i+'</text>';
          out += '<text x="106" y="'+(b.y+42)+'" font-size="10.5" fill="#777">data · timestamp</text>';
          out += '<text x="106" y="'+(b.y+58)+'" font-size="10.5" fill="#777">prev: '+(idx===0?'0000':'hash #'+(idx-1))+'</text>';
          out += '<text x="106" y="'+(b.y+72)+'" font-size="10.5" fill="'+c+'" font-weight="600">hash: '+(b.ok?'a4f…9c':'XX…✗')+'</text>';
          // chain link to next
          if (idx < blocks.length-1) {
            const broken = !blocks[idx+1].ok;
            const lc = broken ? NEG : HASH;
            out += '<line x1="200" y1="'+(b.y+80)+'" x2="200" y2="'+(blocks[idx+1].y)+'" stroke="'+lc+'" stroke-width="2.5" opacity="'+(broken?'0.7':'0.5')+'" '+(broken?'stroke-dasharray="5 4"':'')+'/>';
            if (!broken) out += '<polygon points="196,'+(blocks[idx+1].y-8)+' 204,'+(blocks[idx+1].y-8)+' 200,'+(blocks[idx+1].y)+'" fill="'+lc+'" opacity="0.5"/>';
          }
        });
        // tamper marker
        out += '<text x="330" y="278" font-size="20" fill="'+NEG+'" opacity="0.8">⚠</text>';
        out += '<text x="200" y="346" text-anchor="middle" font-size="11" fill="'+NEG+'" font-weight="600">edit block #2 → link breaks, everyone sees it</text>';
        return out;
      })()}
    </svg>
  </div>
</div>`,

const deck = document.getElementById('deck');
const dots = document.getElementById('dots');

document.getElementById('logoFooter').style.display = 'none';

slides.forEach((html, i) => {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const slide = wrapper.firstElementChild;
  slide.classList.toggle('active', i === 0);
  slide.id = 'sl' + i;
  deck.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => go(i);
  dots.appendChild(dot);
});

function go(i) {
  if (i < 0 || i >= TOTAL || i === cur) return;
  document.getElementById('sl' + cur).classList.remove('active');
  cur = i;
  document.getElementById('sl' + cur).classList.add('active');
  document.getElementById('logoFooter').style.display = (cur === 0) ? 'none' : 'block';
  document.querySelectorAll('.nav-dot').forEach((d,j) => d.classList.toggle('active', j === cur));
  document.getElementById('counter').textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('courseTag').textContent = 'Week 3 · ' + (cur+1) + '/' + TOTAL;
}

function next() { go(cur + 1); }
function prev() { go(cur - 1); }

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.tagName === 'SELECT')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => { let d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 50) d < 0 ? next() : prev(); });

// ============ HASH PLAYGROUND ============
// Self-contained. SHA via Web Crypto; Keccak-256 inlined below; Base64/ROT13 native JS.

/* --- Keccak-256 (compact, public-domain style implementation) --- */
const keccak256 = (function () {
  const RC = [
    0x0000000000000001n,0x0000000000008082n,0x800000000000808an,0x8000000080008000n,
    0x000000000000808bn,0x0000000080000001n,0x8000000080008081n,0x8000000000008009n,
    0x000000000000008an,0x0000000000000088n,0x0000000080008009n,0x000000008000000an,
    0x000000008000808bn,0x800000000000008bn,0x8000000000008089n,0x8000000000008003n,
    0x8000000000008002n,0x8000000000000080n,0x000000000000800an,0x800000008000000an,
    0x8000000080008081n,0x8000000000008080n,0x0000000080000001n,0x8000000080008008n
  ];
  const R = [0,1,62,28,27, 36,44,6,55,20, 3,10,43,25,39, 41,45,15,21,8, 18,2,61,56,14];
  const M = (1n << 64n) - 1n;
  const rotl = (x, n) => ((x << n) | (x >> (64n - n))) & M;

  function keccakf(A) {
    for (let round = 0; round < 24; round++) {
      const C = new Array(5);
      for (let x = 0; x < 5; x++) C[x] = A[x] ^ A[x+5] ^ A[x+10] ^ A[x+15] ^ A[x+20];
      const D = new Array(5);
      for (let x = 0; x < 5; x++) D[x] = C[(x+4)%5] ^ rotl(C[(x+1)%5], 1n);
      for (let x = 0; x < 5; x++) for (let y = 0; y < 25; y += 5) A[x+y] ^= D[x];
      const B = new Array(25);
      for (let x = 0; x < 5; x++) for (let y = 0; y < 5; y++) {
        B[y + ((2*x + 3*y) % 5) * 5] = rotl(A[x + 5*y], BigInt(R[x + 5*y]));
      }
      for (let x = 0; x < 5; x++) for (let y = 0; y < 5; y++) {
        A[x + 5*y] = B[x + 5*y] ^ ((~B[(x+1)%5 + 5*y] & M) & B[(x+2)%5 + 5*y]);
      }
      A[0] ^= RC[round];
    }
  }

  function utf8(str) {
    const b = [];
    for (let i = 0; i < str.length; i++) {
      let c = str.charCodeAt(i);
      if (c < 0x80) b.push(c);
      else if (c < 0x800) b.push(0xc0|(c>>6),0x80|(c&0x3f));
      else if (c < 0xd800 || c >= 0xe000) b.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f));
      else { i++; c = 0x10000 + (((c&0x3ff)<<10)|(str.charCodeAt(i)&0x3ff)); b.push(0xf0|(c>>18),0x80|((c>>12)&0x3f),0x80|((c>>6)&0x3f),0x80|(c&0x3f)); }
    }
    return b;
  }

  return function (str) {
    const rate = 136;
    const padded = utf8(str);
    padded.push(0x01);
    while (padded.length % rate !== 0) padded.push(0x00);
    padded[padded.length - 1] |= 0x80;
    const A = new Array(25).fill(0n);
    for (let p = 0; p < padded.length; p += rate) {
      for (let i = 0; i < rate; i += 8) {
        let lane = 0n;
        for (let k = 0; k < 8; k++) lane |= BigInt(padded[p+i+k]) << BigInt(8*k);
        A[i/8] ^= lane;
      }
      keccakf(A);
    }
    let hex = '';
    for (let i = 0; i < 4; i++) {
      let lane = A[i];
      for (let k = 0; k < 8; k++) hex += Number((lane >> BigInt(8*k)) & 0xffn).toString(16).padStart(2,'0');
    }
    return hex;
  };
})();

/* --- reversible encodings --- */
function toBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
function fromBase64(str) { try { return decodeURIComponent(escape(atob(str))); } catch (e) { return null; } }
function rot13(str) {
  return str.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
  });
}

/* --- SHA via Web Crypto --- */
async function sha(algo, str) {
  const data = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest(algo, data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

/* --- wire the UI --- */
(function initPlayground() {
  const $ = id => document.getElementById(id);
  const input = $('pgInput'), func = $('pgFunc'), gen = $('pgGen'), rev = $('pgRev');
  const out = $('pgOut'), tag = $('pgTag'), status = $('pgStatus'), statusText = $('pgStatusText');
  if (!input) return;

  let lastOutput = '';     // what's currently shown in the output box
  let lastFuncOfOutput = ''; // which function produced it

  function isReversible() {
    return func.selectedOptions[0].dataset.rev === '1';
  }

  function refreshTag() {
    if (isReversible()) {
      tag.textContent = 'REVERSIBLE';
      tag.className = 'pg-tag rev';
      rev.disabled = false;
    } else {
      tag.textContent = 'ONE-WAY';
      tag.className = 'pg-tag oneway';
      rev.disabled = false; // keep enabled so pressing it teaches the lesson
    }
  }

  function setStatus(kind, mark, text) {
    status.className = 'pg-status ' + kind;
    statusText.innerHTML = text;
    status.querySelector('.pg-mark').textContent = mark;
  }

  async function generate() {
    const val = input.value;
    const f = func.value;
    let result;
    if (f === 'sha256') result = await sha('SHA-256', val);
    else if (f === 'sha512') result = await sha('SHA-512', val);
    else if (f === 'keccak256') result = keccak256(val);
    else if (f === 'base64') result = toBase64(val);
    else if (f === 'rot13') result = rot13(val);

    lastOutput = result;
    lastFuncOfOutput = f;
    out.classList.remove('empty');
    out.textContent = result;

    if (isReversible()) {
      setStatus('ok', '✓', 'This is an <strong>encoding</strong> — the original is still in there. Press <strong>Reverse</strong> to get it back.');
    } else {
      const bits = f === 'sha512' ? 512 : 256;
      setStatus('ok', '✓', 'Generated a <strong>' + bits + '-bit fingerprint</strong>. The input can no longer be recovered from it.');
    }
  }

  function reverse() {
    if (!lastOutput) {
      setStatus('neutral', '›', 'Generate something first, then try to reverse it.');
      return;
    }
    if (lastFuncOfOutput === 'base64') {
      const back = fromBase64(lastOutput);
      out.textContent = back === null ? '(invalid)' : back;
      setStatus('ok', '✓', 'Reversed. Base64 is just a re-encoding, so the original text comes straight back.');
    } else if (lastFuncOfOutput === 'rot13') {
      out.textContent = rot13(lastOutput); // ROT13 is its own inverse
      setStatus('ok', '✓', 'Reversed. ROT13 is its own inverse — apply it twice and you\'re home.');
    } else {
      // a real hash
      setStatus('fail', '✗', '<strong>Can\'t be reversed — that\'s the whole point.</strong> A hash throws information away; no function can rebuild the input from the digest.');
    }
  }

  gen.addEventListener('click', generate);
  rev.addEventListener('click', reverse);
  func.addEventListener('change', () => {
    refreshTag();
    out.classList.add('empty');
    out.textContent = '— press Generate —';
    lastOutput = '';
    setStatus('neutral', '›', isReversible()
      ? 'An <strong>encoding</strong>: reversible by design. Generate, then reverse.'
      : 'A <strong>hash</strong>: one-way by design. Generate, then try to reverse.');
  });
  // live avalanche: regenerate as you type, if an output is already showing
  input.addEventListener('input', () => { if (lastOutput) generate(); });

  refreshTag();
})();

</script>
