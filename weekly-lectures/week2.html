<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundations of Web3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: #fff;
  color: #1a1a1a;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.deck { width: 100vw; height: 100vh; position: relative; }

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: none;
  padding: 64px 80px 80px 80px;
}

.slide.active { display: flex; }

/* ===== LAYOUTS ===== */
.layout-center {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.layout-split { flex-direction: row; align-items: center; }

.layout-split .text-side {
  flex: 1;
  padding-right: 64px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.layout-split .visual-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.layout-top {
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 72px;
}

/* ===== TYPOGRAPHY ===== */
.title {
  font-weight: 700;
  font-size: 52px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: #1a1a1a;
}

.title-large { font-size: 64px; }

.subtitle {
  font-weight: 400;
  font-size: 20px;
  line-height: 1.65;
  color: #5f5f5f;
  margin-top: 20px;
  max-width: 560px;
}

.label {
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #1a73e8;
  margin-bottom: 16px;
}

.era-dates {
  font-weight: 500;
  font-size: 15px;
  color: #999;
  margin-top: 4px;
  margin-bottom: 4px;
}

.accent { color: #1a73e8; }

/* ===== COMPONENT LIST ===== */
.components {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 13px;
  max-width: 520px;
}

.component-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.component-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-top: 9px;
  flex-shrink: 0;
}

.component-text {
  font-size: 16.5px;
  line-height: 1.5;
  color: #444;
}

.component-text strong { color: #1a1a1a; font-weight: 600; }

.role-line {
  margin-top: 26px;
  font-size: 16px;
  color: #1a1a1a;
}

.role-line strong { font-weight: 700; }

/* ===== DEFINITION CALLOUT ===== */
.definition {
  margin-top: 24px;
  padding: 22px 26px;
  background: #e8f0fe;
  border-left: 4px solid #1a73e8;
  border-radius: 8px;
  max-width: 540px;
}

.definition .def-term {
  font-weight: 700;
  font-size: 17px;
  color: #1a73e8;
  margin-bottom: 6px;
}

.definition .def-body {
  font-size: 17px;
  line-height: 1.55;
  color: #333;
}

.definition .def-body strong { color: #1a1a1a; font-weight: 600; }

/* ===== PILLARS ===== */
.pillars {
  margin-top: 40px;
  display: flex;
  gap: 24px;
  width: 100%;
  max-width: 1000px;
}

.pillar {
  flex: 1;
  padding: 28px 24px;
  border-radius: 12px;
  background: #fafafa;
  border: 1px solid #eee;
  border-top: 4px solid;
}

.pillar-num {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.pillar-name {
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 10px;
}

.pillar-desc {
  font-size: 15px;
  line-height: 1.55;
  color: #5f5f5f;
}

/* ===== TYPES TABLE ===== */
.cmp-table {
  margin-top: 32px;
  width: 100%;
  max-width: 960px;
  border-collapse: collapse;
}

.cmp-table th {
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
  padding: 0 18px 14px 18px;
  border-bottom: 1px solid #eee;
}

.cmp-table td {
  font-size: 15.5px;
  color: #444;
  padding: 16px 18px;
  border-bottom: 1px solid #f2f2f2;
  vertical-align: top;
}

.cmp-table tr td:first-child { font-weight: 700; color: #1a1a1a; }

.type-tag { display: inline-flex; align-items: center; gap: 8px; }
.type-swatch { width: 10px; height: 10px; border-radius: 3px; }

/* ===== ROADMAP ===== */
.roadmap {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
}

.roadmap-row { display: flex; align-items: flex-start; gap: 16px; }

.roadmap-badge {
  padding: 5px 12px;
  border-radius: 8px;
  background: #e8f0fe;
  color: #1a73e8;
  font-weight: 600;
  font-size: 12.5px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}

.roadmap-text { font-size: 16.5px; line-height: 1.55; color: #444; }
.roadmap-text strong { color: #1a1a1a; font-weight: 600; }

.closer {
  margin-top: 34px;
  padding-top: 24px;
  border-top: 1px solid #eee;
  font-size: 19px;
  font-weight: 500;
  color: #1a1a1a;
  font-style: italic;
  max-width: 600px;
  line-height: 1.5;
}

/* ===== NAV ===== */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}

.nav-counter { font-size: 13px; font-weight: 500; color: #999; }
.nav-dots { display: flex; gap: 6px; }

.nav-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ddd;
  cursor: pointer;
  transition: background 0.2s, width 0.2s;
}

.nav-dot.active { background: #1a73e8; width: 20px; border-radius: 3px; }

.nav-btns { display: flex; gap: 4px; }

.nav-btn {
  width: 36px; height: 36px;
  border: 1px solid #eee;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  color: #666;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn:hover { background: #f8f8f8; color: #1a1a1a; }

svg text { font-family: 'Outfit', sans-serif; }

.course-tag {
  position: fixed;
  top: 26px;
  right: 32px;
  z-index: 101;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #ccc;
}

/* ===== LOGO ===== */
.logo-footer {
  position: fixed;
  top: 22px;
  left: 32px;
  z-index: 101;
  opacity: 0.55;
}

.logo-footer img { height: 26px; width: auto; }

.title-logo { margin-bottom: 36px; }
.title-logo img { height: 54px; width: auto; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .slide { padding: 48px 32px 72px 32px; }
  .layout-split { flex-direction: column; }
  .layout-split .text-side { padding-right: 0; padding-bottom: 24px; }
  .title { font-size: 34px; }
  .title-large { font-size: 40px; }
  .pillars { flex-direction: column; }
  .cmp-table td, .cmp-table th { padding: 10px 8px; font-size: 13px; }
}
</style>
</head>
<body>

<div class="deck" id="deck"></div>

<div class="logo-footer" id="logoFooter">
  <img id="logoFooterImg" alt="Pan-Atlantic University" />
</div>

<div class="course-tag" id="courseTag">Week 2</div>

<div class="nav">
  <div class="nav-counter" id="counter">1 / 8</div>
  <div class="nav-dots" id="dots"></div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="prev()">←</button>
    <button class="nav-btn" onclick="next()">→</button>
  </div>
</div>

// ── 2: THE PROBLEM WITH WEB2 ──
`<div class="slide layout-split">
  <div class="text-side">

    <div class="title">Web2 Runs on<br><span style="color:${NEG};">Someone Else's</span><br>Servers</div>

    <div class="components">

// ── 3: THE ANSWER — DECENTRALIZATION ──
`<div class="slide layout-split">
  <div class="text-side">
    <div class="label">The Answer</div>
    <div class="title">Remove the<br><span class="accent">Middle</span></div>
    <div class="subtitle">Decentralization means no single party is in control. Instead of one server everyone depends on, the system runs across <strong style="color:#1a1a1a;">many independent computers</strong> that all hold the same records.</div>
    <div class="subtitle">If any one node disappears or misbehaves, the network keeps running. There is no off-switch and no single owner.</div>
  </div>
  <div class="visual-side">
    <svg viewBox="0 0 400 360" width="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
      ${(() => {
        let out = '';

        out += '<text x="80" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="'+NEG+'">CENTRALIZED</text>';

        });
        out += '<line x1="45" y1="200" x2="115" y2="75" stroke="'+NEG+'" stroke-width="2.5" opacity="0.6"/>';
        // arrow
        out += '<text x="200" y="120" text-anchor="middle" font-size="28" fill="#ccc">→</text>';
        // decentralized mesh
        out += '<text x="300" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="'+P2+'">DECENTRALIZED</text>';
        const pts = [];
        const n = 7;
        for (let i=0;i<n;i++){
          let a = (i/n)*6.28 - 1.57;
          pts.push({x:300+Math.cos(a)*80, y:160+Math.sin(a)*80});
        }
        for (let i=0;i<n;i++){
          for (let j=i+1;j<n;j++){
            out += '<line x1="'+pts[i].x+'" y1="'+pts[i].y+'" x2="'+pts[j].x+'" y2="'+pts[j].y+'" stroke="'+P2+'" stroke-width="1" opacity="0.18"/>';
          }

        pts.forEach(p => {
          out += '<circle cx="'+p.x+'" cy="'+p.y+'" r="12" fill="'+P2+'" opacity="0.14" stroke="'+P2+'" stroke-width="1.5"/>';

// ── 4: WHAT IS A BLOCKCHAIN ──
`<div class="slide layout-split">

    <div class="subtitle" style="font-size:16px;margin-top:20px;">It's a kind of database — but a normal database is controlled by one owner who can change or erase anything. A blockchain is distributed <em>and</em> decentralized <em>and</em> append-only.</div>

`<div class="slide layout-top">

// ============ RENDER ============
const deck = document.getElementById('deck');
const dots = document.getElementById('dots');

document.getElementById('logoFooterImg').src = PAU_LOGO;
document.getElementById('logoFooter').style.display = 'none';

slides.forEach((html, i) => {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const slide = wrapper.firstElementChild;
  slide.classList.toggle('active', i === 0);
  slide.id = 'sl' + i;
  deck.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => go(i);
  dots.appendChild(dot);
});

function go(i) {
  if (i < 0 || i >= TOTAL || i === cur) return;
  document.getElementById('sl' + cur).classList.remove('active');
  cur = i;
  document.getElementById('sl' + cur).classList.add('active');
  document.getElementById('logoFooter').style.display = (cur === 0) ? 'none' : 'block';
  document.querySelectorAll('.nav-dot').forEach((d,j) => d.classList.toggle('active', j === cur));
  document.getElementById('counter').textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('courseTag').textContent = 'Week 2 · ' + (cur+1) + '/' + TOTAL;
}

function next() { go(cur + 1); }
function prev() { go(cur - 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => { let d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 50) d < 0 ? next() : prev(); });
</script>
</body>
</html>
