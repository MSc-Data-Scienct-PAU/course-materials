<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Evolution of the Web</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: #fff;
  color: #1a1a1a;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.deck { width: 100vw; height: 100vh; position: relative; }

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: none;
  padding: 64px 80px 80px 80px;
}

.slide.active { display: flex; }

/* ===== LAYOUTS ===== */
.layout-center {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.layout-split { flex-direction: row; align-items: center; }

.layout-split .text-side {
  flex: 1;
  padding-right: 64px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.layout-split .visual-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.layout-top {
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 72px;
}

/* ===== TYPOGRAPHY ===== */
.title {
  font-weight: 700;
  font-size: 52px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: #1a1a1a;
}

.title-large { font-size: 64px; }

.subtitle {
  font-weight: 400;
  font-size: 20px;
  line-height: 1.65;
  color: #5f5f5f;
  margin-top: 20px;
  max-width: 560px;
}

.label {
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #1a73e8;
  margin-bottom: 16px;
}

.era-dates {
  font-weight: 500;
  font-size: 15px;
  color: #999;
  margin-top: 4px;
  margin-bottom: 4px;
}

.accent { color: #1a73e8; }

.pill {
  display: inline-flex;
  align-items: center;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
  padding: 6px 16px;
  border-radius: 100px;
  margin-top: 18px;
  width: fit-content;
}

/* ===== COMPONENT LIST ===== */
.components {
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 13px;
  max-width: 520px;
}

.component-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.component-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-top: 9px;
  flex-shrink: 0;
}

.component-text {
  font-size: 16.5px;
  line-height: 1.5;
  color: #444;
}

.component-text strong { color: #1a1a1a; font-weight: 600; }

.role-line {
  margin-top: 26px;
  font-size: 16px;
  color: #1a1a1a;
}

.role-line strong { font-weight: 700; }

/* ===== HOOK ===== */
.hook-flow {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 36px;
}

.hook-word {
  font-size: 30px;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: -0.01em;
}

.hook-word.dim { color: #ccc; font-weight: 600; }

.hook-arrow { color: #1a73e8; font-size: 24px; font-weight: 400; }

/* ===== TABLE ===== */
.cmp-table {
  margin-top: 36px;
  width: 100%;
  max-width: 920px;
  border-collapse: collapse;
}

.cmp-table th {
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
  padding: 0 18px 14px 18px;
  border-bottom: 1px solid #eee;
}

.cmp-table td {
  font-size: 16px;
  color: #444;
  padding: 16px 18px;
  border-bottom: 1px solid #f2f2f2;
  vertical-align: middle;
}

.cmp-table tr td:first-child { font-weight: 700; }

.era-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.era-swatch { width: 10px; height: 10px; border-radius: 3px; }

/* ===== NEXT STEPS ===== */
.roadmap {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
}

.roadmap-row {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.roadmap-badge {
  padding: 5px 12px;
  border-radius: 8px;
  background: #e8f0fe;
  color: #1a73e8;
  font-weight: 600;
  font-size: 12.5px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 1px;
}

.roadmap-text {
  font-size: 16.5px;
  line-height: 1.55;
  color: #444;
}

.roadmap-text strong { color: #1a1a1a; font-weight: 600; }

.closer {
  margin-top: 34px;
  padding-top: 24px;
  border-top: 1px solid #eee;
  font-size: 19px;
  font-weight: 500;
  color: #1a1a1a;
  font-style: italic;
  max-width: 600px;
  line-height: 1.5;
}

/* ===== NAV ===== */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 100;
}

.nav-counter { font-size: 13px; font-weight: 500; color: #999; }
.nav-dots { display: flex; gap: 6px; }

.nav-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #ddd;
  cursor: pointer;
  transition: background 0.2s, width 0.2s;
}

.nav-dot.active { background: #1a73e8; width: 20px; border-radius: 3px; }

.nav-btns { display: flex; gap: 4px; }

.nav-btn {
  width: 36px; height: 36px;
  border: 1px solid #eee;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  color: #666;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn:hover { background: #f8f8f8; color: #1a1a1a; }

svg text { font-family: 'Outfit', sans-serif; }

.course-tag {
  position: fixed;
  top: 26px;
  right: 32px;
  z-index: 101;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #ccc;
}

/* ===== LOGO ===== */
.logo-footer {
  position: fixed;
  top: 22px;
  left: 32px;
  z-index: 101;
  opacity: 0.55;
}

.logo-footer img { height: 26px; width: auto; }

.title-logo { margin-bottom: 36px; }
.title-logo img { height: 54px; width: auto; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .slide { padding: 48px 32px 72px 32px; }
  .layout-split { flex-direction: column; }
  .layout-split .text-side { padding-right: 0; padding-bottom: 24px; }
  .title { font-size: 34px; }
  .title-large { font-size: 40px; }
  .cmp-table td, .cmp-table th { padding: 10px 8px; font-size: 13px; }
  .hook-word { font-size: 22px; }
}
</style>
</head>
<body>

<div class="deck" id="deck"></div>

<div class="logo-footer" id="logoFooter">
  <img id="logoFooterImg" alt="Pan-Atlantic University" />
</div>

<div class="course-tag" id="courseTag">Week 1</div>

<div class="nav">
  <div class="nav-counter" id="counter">1 / 8</div>
  <div class="nav-dots" id="dots"></div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="prev()">←</button>
    <button class="nav-btn" onclick="next()">→</button>
  </div>
</div>

`<div class="slide layout-center">

  <div class="title title-large">The Evolution<br>of the Web</div>
  <div class="subtitle" style="text-align:center;margin-top:24px;">From read-only pages to an agentic web that acts on our behalf.</div>
  <div style="margin-top:44px;">
    <svg viewBox="0 0 460 130" width="460" height="130" fill="none" xmlns="http://www.w3.org/2000/svg">
      ${(() => {
        let out = '';
        const cx = [60, 175, 290, 405];
        const cols = [COL.web1, COL.web2, COL.web3, COL.web4];
        const labels = ['Web1','Web2','Web3','Web4'];
        // connecting line
        out += '<line x1="60" y1="65" x2="405" y2="65" stroke="#eee" stroke-width="2"/>';
        cx.forEach((x,i) => {
          // growing density of nodes around each point
          const nodes = i + 1;
          if (i === 0) {
            out += '<circle cx="'+x+'" cy="65" r="9" fill="'+cols[i]+'" opacity="0.85"/>';
          } else {
            out += '<circle cx="'+x+'" cy="65" r="7" fill="'+cols[i]+'" opacity="0.85"/>';
            for (let n=0;n<nodes;n++){
              let a = (n/nodes)*6.28 + i;
              let r = 20 + i*3;
              let nx = x+Math.cos(a)*r, ny = 65+Math.sin(a)*r;
              out += '<line x1="'+x+'" y1="65" x2="'+nx+'" y2="'+ny+'" stroke="'+cols[i]+'" stroke-width="1" opacity="0.3"/>';
              out += '<circle cx="'+nx+'" cy="'+ny+'" r="3.5" fill="'+cols[i]+'" opacity="0.6"/>';
            }
          }
          out += '<text x="'+x+'" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="'+cols[i]+'">'+labels[i]+'</text>';
        });
        return out;
      })()}
    </svg>
  </div>
</div>`,

// ── 2: HOOK ──
`<div class="slide layout-split">
  <div class="text-side">
    <div class="label">The Big Idea</div>

      <span class="hook-word">Reader</span>

      <span class="hook-arrow">→</span>
      <span class="hook-word accent">Director</span>
    </div>

  </div>

</div>`,

// ============ RENDER ============
const deck = document.getElementById('deck');
const dots = document.getElementById('dots');

document.getElementById('logoFooterImg').src = PAU_LOGO;
document.getElementById('logoFooter').style.display = 'none';

slides.forEach((html, i) => {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const slide = wrapper.firstElementChild;
  slide.classList.toggle('active', i === 0);
  slide.id = 'sl' + i;
  deck.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => go(i);
  dots.appendChild(dot);
});

function go(i) {
  if (i < 0 || i >= TOTAL || i === cur) return;
  document.getElementById('sl' + cur).classList.remove('active');
  cur = i;
  document.getElementById('sl' + cur).classList.add('active');
  document.getElementById('logoFooter').style.display = (cur === 0) ? 'none' : 'block';
  document.querySelectorAll('.nav-dot').forEach((d,j) => d.classList.toggle('active', j === cur));
  document.getElementById('counter').textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('courseTag').textContent = 'Week 1 · ' + (cur+1) + '/' + TOTAL;
}

function next() { go(cur + 1); }
function prev() { go(cur - 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => { let d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 50) d < 0 ? next() : prev(); });
</script>
