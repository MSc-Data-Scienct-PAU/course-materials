<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dApps &amp; the Web3 Stack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body { font-family: 'Outfit', sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; -webkit-font-smoothing: antialiased; }

.deck { width: 100vw; height: 100vh; position: relative; }

.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: none; padding: 64px 80px 80px 80px; }
.slide.active { display: flex; }

/* ===== LAYOUTS ===== */
.layout-center { flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.layout-split { flex-direction: row; align-items: center; }
.layout-split .text-side { flex: 1; padding-right: 64px; display: flex; flex-direction: column; justify-content: center; }
.layout-split .visual-side { flex: 1; display: flex; align-items: center; justify-content: center; }
.layout-top { flex-direction: column; justify-content: flex-start; padding-top: 72px; }

/* ===== TYPOGRAPHY ===== */
.title { font-weight: 700; font-size: 52px; line-height: 1.15; letter-spacing: -0.02em; color: #1a1a1a; }
.title-large { font-size: 64px; }
.subtitle { font-weight: 400; font-size: 20px; line-height: 1.65; color: #5f5f5f; margin-top: 20px; max-width: 560px; }
.label { font-weight: 600; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #1a73e8; margin-bottom: 16px; }
.accent { color: #1a73e8; }

/* ===== COMPONENT LIST ===== */
.components { margin-top: 28px; display: flex; flex-direction: column; gap: 13px; max-width: 520px; }
.component-row { display: flex; align-items: flex-start; gap: 14px; }
.component-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 9px; flex-shrink: 0; }
.component-text { font-size: 16.5px; line-height: 1.5; color: #444; }
.component-text strong { color: #1a1a1a; font-weight: 600; }
.component-text code { font-family: 'SFMono-Regular', ui-monospace, monospace; font-size: 14px; background: #f0f3f8; padding: 1px 6px; border-radius: 5px; color: #1a73e8; }
.role-line { margin-top: 26px; font-size: 16px; color: #1a1a1a; }
.role-line strong { font-weight: 700; }

/* ===== HOOK ===== */
.hook-flow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 36px; }
.hook-word { font-size: 26px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em; }
.hook-arrow { color: #1a73e8; font-size: 20px; font-weight: 400; }

/* ===== DEFINITION CALLOUT ===== */
.definition { margin-top: 24px; padding: 22px 26px; background: #e8f0fe; border-left: 4px solid #1a73e8; border-radius: 8px; max-width: 540px; }
.definition .def-term { font-weight: 700; font-size: 17px; color: #1a73e8; margin-bottom: 6px; }
.definition .def-body { font-size: 17px; line-height: 1.55; color: #333; }
.definition .def-body strong { color: #1a1a1a; font-weight: 600; }

/* ===== TABLE ===== */
.cmp-table { margin-top: 32px; width: 100%; max-width: 960px; border-collapse: collapse; }
.cmp-table th { text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #999; padding: 0 18px 14px 18px; border-bottom: 1px solid #eee; }
.cmp-table td { font-size: 15.5px; color: #444; padding: 15px 18px; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
.cmp-table tr td:first-child { font-weight: 700; color: #1a1a1a; }
.type-tag { display: inline-flex; align-items: center; gap: 8px; }
.type-swatch { width: 10px; height: 10px; border-radius: 3px; }

/* ===== ROADMAP ===== */
.roadmap { margin-top: 30px; display: flex; flex-direction: column; gap: 16px; max-width: 600px; }
.roadmap-row { display: flex; align-items: flex-start; gap: 16px; }
.roadmap-badge { padding: 5px 12px; border-radius: 8px; background: #e8f0fe; color: #1a73e8; font-weight: 600; font-size: 12.5px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.roadmap-text { font-size: 16.5px; line-height: 1.55; color: #444; }
.roadmap-text strong { color: #1a1a1a; font-weight: 600; }
.closer { margin-top: 34px; padding-top: 24px; border-top: 1px solid #eee; font-size: 19px; font-weight: 500; color: #1a1a1a; font-style: italic; max-width: 600px; line-height: 1.5; }

/* ===== NAV ===== */
.nav { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100; }
.nav-counter { font-size: 13px; font-weight: 500; color: #999; }
.nav-dots { display: flex; gap: 6px; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.2s, width 0.2s; }
.nav-dot.active { background: #1a73e8; width: 20px; border-radius: 3px; }
.nav-btns { display: flex; gap: 4px; }
.nav-btn { width: 36px; height: 36px; border: 1px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { background: #f8f8f8; color: #1a1a1a; }

svg text { font-family: 'Outfit', sans-serif; }

.course-tag { position: fixed; top: 26px; right: 32px; z-index: 101; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #ccc; }

/* ===== LOGO ===== */
.logo-footer { position: fixed; top: 22px; left: 32px; z-index: 101; opacity: 0.55; }
.logo-footer img { height: 26px; width: auto; }
.title-logo { margin-bottom: 36px; }
.title-logo img { height: 54px; width: auto; }

/* ===== CODE BLOCK ===== */
.code-block { margin-top: 22px; background: #f6f8fc; border: 1px solid #e6ebf5; border-radius: 12px; padding: 18px 20px; font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; font-size: 13px; line-height: 1.75; color: #3a4252; max-width: 540px; white-space: pre; overflow-x: auto; }
.code-block .kw { color: #1a73e8; font-weight: 600; }
.code-block .ty { color: #2f9e44; }
.code-block .st { color: #d9822b; }
.code-block .cm { color: #a0a8b8; font-style: italic; }
.code-block .fn { color: #7c3aed; font-weight: 600; }

/* ===== dAPP SIMULATOR ===== */
.dapp { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 14px; }
.dapp-card { border: 1.5px solid #e3ebf8; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 24px rgba(26,115,232,0.06); }
.dapp-top { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #eef2f8; background: #fafbfe; }
.dapp-title { font-weight: 700; font-size: 14px; color: #1a1a1a; }
.connect-btn { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; padding: 8px 16px; border: none; border-radius: 100px; background: #FCC419; color: #7a5c00; cursor: pointer; transition: filter 0.15s; }
.connect-btn:hover { filter: brightness(0.96); }
.wallet-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; background: #fff6e5; color: #b8860b; padding: 6px 12px; border-radius: 100px; border: 1px solid #f0e0b8; font-family: 'SFMono-Regular', ui-monospace, monospace; }
.disconnect { font-size: 11px; color: #aaa; cursor: pointer; margin-left: 8px; text-decoration: underline; }

.dapp-body { padding: 26px 20px; min-height: 168px; display: flex; flex-direction: column; justify-content: center; }
.dapp-prompt { text-align: center; color: #999; font-size: 15px; }
.dapp-bal-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #aaa; }
.dapp-bal-val { font-size: 38px; font-weight: 800; color: #1a73e8; font-variant-numeric: tabular-nums; line-height: 1.1; margin: 4px 0 2px; transition: background 0.5s; border-radius: 8px; display: inline-block; padding: 0 6px; }
.dapp-bal-val.flash { background: #fff2bf; transition: background 0s; }
.dapp-bal-unit { font-size: 16px; font-weight: 600; color: #9aa3b2; }
.dapp-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
.dapp-btn { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; padding: 11px 18px; border: none; border-radius: 10px; background: #1a73e8; color: #fff; cursor: pointer; transition: filter 0.15s; }
.dapp-btn.alt { background: #fff; color: #1a73e8; border: 1.5px solid #cfe0fb; }
.dapp-btn:hover { filter: brightness(0.95); }
.dapp-btn:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }

.wallet-popup { border: 1.6px solid #f0d488; background: #fffdf6; border-radius: 14px; padding: 16px 18px; }
.wp-head { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; color: #b8860b; margin-bottom: 12px; }
.wp-rows { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.wp-row { display: flex; justify-content: space-between; font-size: 13.5px; }
.wp-row .k { color: #999; }
.wp-row .v { font-weight: 600; color: #1a1a1a; font-family: 'SFMono-Regular', ui-monospace, monospace; }
.wp-btns { display: flex; gap: 10px; }
.wp-btn { flex: 1; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; padding: 10px; border-radius: 10px; cursor: pointer; border: none; }
.wp-btn.confirm { background: #2f9e44; color: #fff; }
.wp-btn.reject { background: #fff; color: #c0392b; border: 1.5px solid #ecc4c0; }

.dapp-status { font-size: 14px; line-height: 1.5; padding: 11px 14px; border-radius: 10px; display: flex; gap: 9px; align-items: flex-start; }
.dapp-status.neutral { background: #f6f6f6; color: #666; }
.dapp-status.pending { background: #fff6e5; color: #b8860b; }
.dapp-status.ok { background: #eafbef; color: #2f7d3f; }
.dapp-status.bad { background: #fdeaea; color: #c0392b; }
.dapp-status .d-mark { font-weight: 700; flex-shrink: 0; }
.dapp-status .tx { font-family: 'SFMono-Regular', ui-monospace, monospace; font-size: 12px; opacity: 0.85; display: block; margin-top: 2px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .slide { padding: 48px 32px 72px 32px; }
  .layout-split { flex-direction: column; }
  .layout-split .text-side { padding-right: 0; padding-bottom: 24px; }
  .title { font-size: 34px; }
  .title-large { font-size: 40px; }
  .cmp-table td, .cmp-table th { padding: 10px 8px; font-size: 13px; }
  .hook-word { font-size: 19px; }
  .dapp, .code-block { max-width: 100%; }
}
</style>
</head>

  <img id="logoFooterImg" alt="Pan-Atlantic University" />

  <div class="nav-counter" id="counter">1 / 9</div>

  <div class="nav-btns">

</div>

        out += link(274,190,312,190,FRONT);           // contract-ipfs
        out += '<text x="200" y="350" text-anchor="middle" font-size="10" fill="#999">front-end · wallet · contracts · oracle · storage</text>';
        return out;
      })()}
    </svg>
  </div>
</div>`,

];


// ============ RENDER ============
const deck = document.getElementById('deck');
const dots = document.getElementById('dots');

document.getElementById('logoFooterImg').src = PAU_LOGO;
document.getElementById('logoFooter').style.display = 'none';

slides.forEach((html, i) => {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const slide = wrapper.firstElementChild;
  slide.classList.toggle('active', i === 0);
  slide.id = 'sl' + i;
  deck.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => go(i);
  dots.appendChild(dot);
});

function go(i) {
  if (i < 0 || i >= TOTAL || i === cur) return;
  document.getElementById('sl' + cur).classList.remove('active');
  cur = i;
  document.getElementById('sl' + cur).classList.add('active');
  document.getElementById('logoFooter').style.display = (cur === 0) ? 'none' : 'block';
  document.querySelectorAll('.nav-dot').forEach((d,j) => d.classList.toggle('active', j === cur));
  document.getElementById('counter').textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('courseTag').textContent = 'Week 6 · ' + (cur+1) + '/' + TOTAL;
}

function next() { go(cur + 1); }
function prev() { go(cur - 1); }

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.tagName === 'SELECT')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => { let d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 50) d < 0 ? next() : prev(); });

// ============ dAPP SIMULATOR ============
(function initDapp() {
  const $ = id => document.getElementById(id);
  const walletArea = $('walletArea'), body = $('dappBody'), popup = $('walletPopup');
  const status = $('dappStatus'), statusText = $('dappStatusText');
  if (!walletArea) return;

  const randHex = n => Array.from({length:n}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
  const GAS_MINT = 51000, GAS_XFER = 35000;

  const st = { connected:false, address:'', balance:0, busy:false, pending:null };

  function setStatus(kind, mark, text, tx) {
    status.className = 'dapp-status ' + kind;
    statusText.innerHTML = text + (tx ? '<span class="tx">' + tx + '</span>' : '');
    status.querySelector('.d-mark').textContent = mark;
  }

  function shortAddr(a) { return a.slice(0,6) + '…' + a.slice(-4); }

  function renderWalletArea() {
    if (!st.connected) {
      walletArea.innerHTML = '<button id="connectBtn" class="connect-btn">Connect Wallet</button>';
      $('connectBtn').addEventListener('click', connect);
    } else {
      walletArea.innerHTML = '<span class="wallet-pill">🦊 ' + shortAddr(st.address) + '</span><span class="disconnect" id="discBtn">disconnect</span>';
      $('discBtn').addEventListener('click', disconnect);
    }
  }

  function renderBody() {
    if (!st.connected) {
      body.innerHTML = '<div class="dapp-prompt" id="dappPrompt">Connect your wallet to begin.</div>';
      return;
    }
    body.innerHTML =
      '<div><div class="dapp-bal-label">Your balance</div>' +
      '<div><span class="dapp-bal-val" id="balVal">' + st.balance + '</span> <span class="dapp-bal-unit">PAU</span></div></div>' +
      '<div class="dapp-actions">' +
        '<button class="dapp-btn" id="actMint" ' + (st.busy?'disabled':'') + '>Mint 100 PAU</button>' +
        '<button class="dapp-btn alt" id="actSend" ' + (st.busy?'disabled':'') + '>Send 30 → Alice</button>' +
      '</div>';
    $('actMint').addEventListener('click', () => askWallet('mint', 100, GAS_MINT));
    $('actSend').addEventListener('click', () => askWallet('transfer', 30, GAS_XFER));
  }

  function connect() {
    st.connected = true;
    st.address = '0x' + randHex(40);
    renderWalletArea(); renderBody();
    setStatus('ok', '✓', 'Wallet connected: <b>' + shortAddr(st.address) + '</b>. Now try a transaction.');
  }

  function disconnect() {
    st.connected = false; st.busy = false; st.pending = null;
    popup.style.display = 'none';
    renderWalletArea(); renderBody();
    setStatus('neutral', '›', 'Disconnected. Balance is preserved on-chain.');
  }

  function askWallet(fn, amount, gas) {
    if (st.busy) return;
    st.pending = { fn, amount, gas };
    const label = fn === 'mint' ? 'mint(' + amount + ')' : 'transfer(Alice, ' + amount + ')';
    popup.style.display = 'block';
    popup.className = '';
    popup.innerHTML =
      '<div class="wallet-popup">' +
        '<div class="wp-head">🦊 Confirm transaction</div>' +
        '<div class="wp-rows">' +
          '<div class="wp-row"><span class="k">Function</span><span class="v">' + label + '</span></div>' +
          '<div class="wp-row"><span class="k">From</span><span class="v">' + shortAddr(st.address) + '</span></div>' +
          '<div class="wp-row"><span class="k">Est. network fee</span><span class="v">~' + gas.toLocaleString('en-US') + ' gas</span></div>' +
        '</div>' +
        '<div class="wp-btns">' +
          '<button class="wp-btn reject" id="wpReject">Reject</button>' +
          '<button class="wp-btn confirm" id="wpConfirm">Confirm</button>' +
        '</div>' +
      '</div>';
    $('wpReject').addEventListener('click', rejectTx);
    $('wpConfirm').addEventListener('click', confirmTx);
    setStatus('pending', '🦊', 'Waiting for you to confirm in the wallet…');
  }

  function rejectTx() {
    popup.style.display = 'none';
    st.pending = null;
    setStatus('bad', '✗', 'Rejected in wallet — <b>no transaction sent, no gas charged.</b>');
  }

  function confirmTx() {
    const p = st.pending;
    popup.style.display = 'none';
    st.busy = true; renderBody();
    setStatus('pending', '⏳', 'Transaction submitted — broadcasting to the network…');

    setTimeout(() => {
      // on-chain revert path: sending more than balance
      if (p.fn === 'transfer' && st.balance < p.amount) {
        st.busy = false; renderBody();
        setStatus('bad', '❌', 'Reverted on-chain: <b>"balance too low"</b> — you hold ' + st.balance + ', tried to send ' + p.amount + '. Gas still spent.');
        return;
      }
      if (p.fn === 'mint') st.balance += p.amount;
      else st.balance -= p.amount;

      const block = (21900000 + Math.floor(Math.random()*60000)).toLocaleString('en-US');
      const hash = '0x' + randHex(8) + '…' + randHex(6);
      st.busy = false; renderBody();
      const bv = $('balVal');
      if (bv) { bv.classList.remove('flash'); void bv.offsetWidth; bv.classList.add('flash'); }
      setStatus('ok', '✅', 'Confirmed in block #' + block + '.', 'tx ' + hash);
    }, 1500);
  }

  renderWalletArea(); renderBody();
  setStatus('neutral', '›', 'Not connected.');
})();
</script>
</body>
</html>
