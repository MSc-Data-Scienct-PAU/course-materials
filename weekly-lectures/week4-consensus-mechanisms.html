<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consensus Mechanisms</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: #fff;
  color: #1a1a1a;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.deck { width: 100vw; height: 100vh; position: relative; }

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: none;
  padding: 64px 80px 80px 80px;
}

.slide.active { display: flex; }

/* ===== LAYOUTS ===== */
.layout-center { flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.layout-split { flex-direction: row; align-items: center; }
.layout-split .text-side { flex: 1; padding-right: 64px; display: flex; flex-direction: column; justify-content: center; }
.layout-split .visual-side { flex: 1; display: flex; align-items: center; justify-content: center; }
.layout-top { flex-direction: column; justify-content: flex-start; padding-top: 72px; }

/* ===== TYPOGRAPHY ===== */
.title { font-weight: 700; font-size: 52px; line-height: 1.15; letter-spacing: -0.02em; color: #1a1a1a; }
.title-large { font-size: 64px; }
.subtitle { font-weight: 400; font-size: 20px; line-height: 1.65; color: #5f5f5f; margin-top: 20px; max-width: 560px; }
.label { font-weight: 600; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #1a73e8; margin-bottom: 16px; }
.era-dates { font-weight: 500; font-size: 15px; color: #999; margin-top: 4px; margin-bottom: 4px; }
.accent { color: #1a73e8; }

/* ===== COMPONENT LIST ===== */
.components { margin-top: 28px; display: flex; flex-direction: column; gap: 13px; max-width: 520px; }
.component-row { display: flex; align-items: flex-start; gap: 14px; }
.component-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 9px; flex-shrink: 0; }
.component-text { font-size: 16.5px; line-height: 1.5; color: #444; }
.component-text strong { color: #1a1a1a; font-weight: 600; }
.role-line { margin-top: 26px; font-size: 16px; color: #1a1a1a; }
.role-line strong { font-weight: 700; }

/* ===== HOOK ===== */
.hook-flow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 36px; }
.hook-word { font-size: 28px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em; }
.hook-arrow { color: #1a73e8; font-size: 22px; font-weight: 400; }

/* ===== DEFINITION CALLOUT ===== */
.definition { margin-top: 24px; padding: 22px 26px; background: #e8f0fe; border-left: 4px solid #1a73e8; border-radius: 8px; max-width: 540px; }
.definition .def-term { font-weight: 700; font-size: 17px; color: #1a73e8; margin-bottom: 6px; }
.definition .def-body { font-size: 17px; line-height: 1.55; color: #333; }
.definition .def-body strong { color: #1a1a1a; font-weight: 600; }

/* ===== TABLE ===== */
.cmp-table { margin-top: 32px; width: 100%; max-width: 960px; border-collapse: collapse; }
.cmp-table th { text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #999; padding: 0 18px 14px 18px; border-bottom: 1px solid #eee; }
.cmp-table td { font-size: 15.5px; color: #444; padding: 15px 18px; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
.cmp-table tr td:first-child { font-weight: 700; color: #1a1a1a; }
.type-tag { display: inline-flex; align-items: center; gap: 8px; }
.type-swatch { width: 10px; height: 10px; border-radius: 3px; }

/* ===== ROADMAP ===== */
.roadmap { margin-top: 30px; display: flex; flex-direction: column; gap: 16px; max-width: 600px; }
.roadmap-row { display: flex; align-items: flex-start; gap: 16px; }
.roadmap-badge { padding: 5px 12px; border-radius: 8px; background: #e8f0fe; color: #1a73e8; font-weight: 600; font-size: 12.5px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.roadmap-text { font-size: 16.5px; line-height: 1.55; color: #444; }
.roadmap-text strong { color: #1a1a1a; font-weight: 600; }
.closer { margin-top: 34px; padding-top: 24px; border-top: 1px solid #eee; font-size: 19px; font-weight: 500; color: #1a1a1a; font-style: italic; max-width: 600px; line-height: 1.5; }

/* ===== NAV ===== */
.nav { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100; }
.nav-counter { font-size: 13px; font-weight: 500; color: #999; }
.nav-dots { display: flex; gap: 6px; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.2s, width 0.2s; }
.nav-dot.active { background: #1a73e8; width: 20px; border-radius: 3px; }
.nav-btns { display: flex; gap: 4px; }
.nav-btn { width: 36px; height: 36px; border: 1px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { background: #f8f8f8; color: #1a1a1a; }

svg text { font-family: 'Outfit', sans-serif; }

.course-tag { position: fixed; top: 26px; right: 32px; z-index: 101; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #ccc; }

/* ===== LOGO ===== */
.logo-footer { position: fixed; top: 22px; left: 32px; z-index: 101; opacity: 0.55; }
.logo-footer img { height: 26px; width: auto; }
.title-logo { margin-bottom: 36px; }
.title-logo img { height: 54px; width: auto; }

/* ===== MINING ACTIVITY ===== */
.mine {
  margin-top: 22px;
  width: 100%;
  max-width: 580px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.mine-field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 8px;
}

.mine-input {
  width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  padding: 12px 14px;
  border: 1.5px solid #e3e3e3;
  border-radius: 10px;
  background: #fafafa;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.15s;
}
.mine-input:focus { border-color: #1a73e8; background: #fff; }

.diff-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.diff-seg { display: inline-flex; border: 1.5px solid #e3e3e3; border-radius: 10px; overflow: hidden; }
.diff-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 600;
  padding: 10px 16px;
  background: #fff; color: #666;
  border: none; cursor: pointer;
  border-right: 1px solid #eee;
  transition: background 0.12s, color 0.12s;
}
.diff-btn:last-child { border-right: none; }
.diff-btn.active { background: #1a73e8; color: #fff; }
.diff-hint { font-size: 13px; color: #999; }

.mine-target {
  font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
  font-size: 14px;
  color: #666;
}
.mine-target b { color: #1a73e8; }

.hash-box {
  font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
  font-size: 15px;
  letter-spacing: 0.5px;
  word-break: break-all;
  padding: 16px;
  background: #f4f7fc;
  border: 1.5px solid #e3ebf8;
  border-radius: 10px;
  color: #444;
  min-height: 56px;
  line-height: 1.45;
}
.hash-box .zeros { color: #2f9e44; font-weight: 700; }
.hash-box.win { background: #eafbef; border-color: #b8ecc6; }

.mine-controls { display: flex; gap: 10px; flex-wrap: wrap; }
.mine-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 14.5px; font-weight: 600;
  padding: 12px 24px;
  border-radius: 10px; border: none; cursor: pointer;
  transition: filter 0.15s, opacity 0.15s;
}
.mine-btn:hover { filter: brightness(0.94); }
.mine-btn.go { background: #1a73e8; color: #fff; }
.mine-btn.stop { background: #fff; color: #e05555; border: 1.5px solid #e05555; }
.mine-btn.reset { background: #fff; color: #666; border: 1.5px solid #ddd; }
.mine-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

.mine-stats { display: flex; gap: 12px; flex-wrap: wrap; }
.stat {
  flex: 1; min-width: 120px;
  padding: 12px 14px;
  border-radius: 10px;
  background: #f6f6f6;
}
.stat .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #999; }
.stat .stat-val { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-top: 3px; font-variant-numeric: tabular-nums; }
.stat.find .stat-val { color: #1a73e8; }
.stat.verify { background: #eafbef; }
.stat.verify .stat-val { color: #2f9e44; }

.mine-status {
  font-size: 14.5px; line-height: 1.5;
  padding: 12px 16px; border-radius: 10px;
  display: flex; align-items: flex-start; gap: 10px;
}
.mine-status.neutral { background: #f6f6f6; color: #666; }
.mine-status.working { background: #fff6e5; color: #b8860b; }
.mine-status.won { background: #eafbef; color: #2f7d3f; }
.mine-status .m-mark { font-weight: 700; flex-shrink: 0; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .slide { padding: 48px 32px 72px 32px; }
  .layout-split { flex-direction: column; }
  .layout-split .text-side { padding-right: 0; padding-bottom: 24px; }
  .title { font-size: 34px; }
  .title-large { font-size: 40px; }
  .cmp-table td, .cmp-table th { padding: 10px 8px; font-size: 13px; }
  .hook-word { font-size: 20px; }
  .mine { max-width: 100%; }
}
</style>
</head>

<div class="logo-footer" id="logoFooter">
  <img id="logoFooterImg" alt="Pan-Atlantic University" />

const deck = document.getElementById('deck');
const dots = document.getElementById('dots');

document.getElementById('logoFooterImg').src = PAU_LOGO;
document.getElementById('logoFooter').style.display = 'none';

slides.forEach((html, i) => {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  const slide = wrapper.firstElementChild;
  slide.classList.toggle('active', i === 0);
  slide.id = 'sl' + i;
  deck.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => go(i);
  dots.appendChild(dot);
});

function go(i) {
  if (i < 0 || i >= TOTAL || i === cur) return;
  document.getElementById('sl' + cur).classList.remove('active');
  cur = i;
  document.getElementById('sl' + cur).classList.add('active');
  document.getElementById('logoFooter').style.display = (cur === 0) ? 'none' : 'block';
  document.querySelectorAll('.nav-dot').forEach((d,j) => d.classList.toggle('active', j === cur));
  document.getElementById('counter').textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('courseTag').textContent = 'Week 4 · ' + (cur+1) + '/' + TOTAL;
}

function next() { go(cur + 1); }
function prev() { go(cur - 1); }

document.addEventListener('keydown', e => {
  const t = e.target;
  if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.tagName === 'SELECT')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => { let d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 50) d < 0 ? next() : prev(); });

// ============ SHA-256 (synchronous, for the miner) ============
const sha256 = (function () {
  const K = new Uint32Array([
    0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
  ]);
  const rotr = (x,n) => (x>>>n)|(x<<(32-n));
  function utf8(str){
    const b=[];
    for(let i=0;i<str.length;i++){
      let c=str.charCodeAt(i);
      if(c<0x80)b.push(c);
      else if(c<0x800)b.push(0xc0|(c>>6),0x80|(c&0x3f));
      else if(c<0xd800||c>=0xe000)b.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f));
      else{i++;c=0x10000+(((c&0x3ff)<<10)|(str.charCodeAt(i)&0x3ff));b.push(0xf0|(c>>18),0x80|((c>>12)&0x3f),0x80|((c>>6)&0x3f),0x80|(c&0x3f));}
    }
    return b;
  }
  return function(str){
    const msg=utf8(str);
    const bitLen=msg.length*8;
    msg.push(0x80);
    while(msg.length%64!==56)msg.push(0);
    for(let i=0;i<4;i++)msg.push(0);
    msg.push((bitLen>>>24)&0xff,(bitLen>>>16)&0xff,(bitLen>>>8)&0xff,bitLen&0xff);
    let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,
        h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
    const w=new Uint32Array(64);
    for(let i=0;i<msg.length;i+=64){
      for(let t=0;t<16;t++)
        w[t]=(msg[i+t*4]<<24)|(msg[i+t*4+1]<<16)|(msg[i+t*4+2]<<8)|(msg[i+t*4+3]);
      for(let t=16;t<64;t++){
        const s0=rotr(w[t-15],7)^rotr(w[t-15],18)^(w[t-15]>>>3);
        const s1=rotr(w[t-2],17)^rotr(w[t-2],19)^(w[t-2]>>>10);
        w[t]=(w[t-16]+s0+w[t-7]+s1)|0;
      }
      let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
      for(let t=0;t<64;t++){
        const S1=rotr(e,6)^rotr(e,11)^rotr(e,25);
        const ch=(e&f)^((~e)&g);
        const t1=(h+S1+ch+K[t]+w[t])|0;
        const S0=rotr(a,2)^rotr(a,13)^rotr(a,22);
        const maj=(a&b)^(a&c)^(b&c);
        const t2=(S0+maj)|0;
        h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
      }
      h0=(h0+a)|0;h1=(h1+b)|0;h2=(h2+c)|0;h3=(h3+d)|0;
      h4=(h4+e)|0;h5=(h5+f)|0;h6=(h6+g)|0;h7=(h7+h)|0;
    }
    const hx=x=>((x>>>0).toString(16).padStart(8,'0'));
    return hx(h0)+hx(h1)+hx(h2)+hx(h3)+hx(h4)+hx(h5)+hx(h6)+hx(h7);
  };
})();

// ============ MINING ACTIVITY ============
(function initMiner() {
  const $ = id => document.getElementById(id);
  const dataIn = $('mineData'), seg = $('diffSeg'), hint = $('diffHint'), target = $('mineTarget');
  const hashBox = $('hashBox'), go = $('mineGo'), stop = $('mineStop'), reset = $('mineReset');
  const statAttempts = $('statAttempts'), statVerify = $('statVerify');
  const status = $('mineStatus'), statusText = $('mineStatusText');
  if (!dataIn) return;

  let difficulty = 2;
  let mining = false;
  let nonce = 0, attempts = 0, startTime = 0;

  const fmt = n => n.toLocaleString('en-US');
  const prefix = () => '0'.repeat(difficulty);

  function renderHash(hex, won) {
    const z = prefix().length;
    let lead = 0;
    while (lead < hex.length && hex[lead] === '0') lead++;
    const shown = Math.min(Math.max(lead, z), hex.length);
    hashBox.classList.remove('empty');
    hashBox.classList.toggle('win', !!won);
    hashBox.innerHTML = '<span class="zeros">' + hex.slice(0, shown) + '</span>' + hex.slice(shown);
  }

  function setStatus(kind, mark, text) {
    status.className = 'mine-status ' + kind;
    statusText.innerHTML = text;
    status.querySelector('.m-mark').textContent = mark;
  }

  function updateTarget() {
    target.innerHTML = 'target: hash must start with <b>' + prefix() + '</b>';
  }

  function resetState(msg) {
    mining = false;
    nonce = 0; attempts = 0;
    go.disabled = false; stop.disabled = true;
    statAttempts.textContent = '0';
    statVerify.textContent = '—';
    hashBox.className = 'hash-box empty';
    hashBox.textContent = '— press Mine —';
    setStatus('neutral', '⛏', msg || 'Choose a difficulty and start mining.');
  }

  function step() {
    if (!mining) return;
    const data = dataIn.value;
    const pre = prefix();
    const batch = 3000;
    let lastHash = '';
    for (let i = 0; i < batch; i++) {
      const h = sha256(data + nonce);
      attempts++;
      lastHash = h;
      if (h.startsWith(pre)) {
        mining = false;
        go.disabled = false; stop.disabled = true;
        statAttempts.textContent = fmt(attempts);
        statVerify.textContent = '1';
        renderHash(h, true);
        const secs = ((performance.now() - startTime) / 1000);
        setStatus('won', '✓',
          '<strong>Block mined!</strong> Found a valid nonce (' + fmt(nonce) + ') after <strong>' +
          fmt(attempts) + '</strong> tries in ' + secs.toFixed(2) + 's. Anyone can now verify it in <strong>one</strong> hash.');
        return;
      }
      nonce++;
    }
    statAttempts.textContent = fmt(attempts);
    renderHash(lastHash, false);
    setStatus('working', '⛏', 'Mining… trying nonce ' + fmt(nonce) + ' (' + fmt(attempts) + ' hashes so far).');
    setTimeout(step, 0); // yield so the UI updates
  }

  function startMining() {
    if (mining) return;
    mining = true;
    nonce = 0; attempts = 0; startTime = performance.now();
    go.disabled = true; stop.disabled = false;
    statVerify.textContent = '—';
    setStatus('working', '⛏', 'Mining…');
    setTimeout(step, 0);
  }

  go.addEventListener('click', startMining);
  stop.addEventListener('click', () => {
    if (!mining) return;
    mining = false;
    go.disabled = false; stop.disabled = true;
    setStatus('neutral', '⛏', 'Stopped at ' + fmt(attempts) + ' attempts. Press Mine to resume from scratch.');
  });
  reset.addEventListener('click', () => resetState());
  dataIn.addEventListener('input', () => { if (!mining) resetState('Block data changed — press Mine.'); });

  seg.addEventListener('click', e => {
    const btn = e.target.closest('.diff-btn');
    if (!btn) return;
    difficulty = parseInt(btn.dataset.d, 10);
    [...seg.children].forEach(b => b.classList.toggle('active', b === btn));
    hint.textContent = difficulty >= 5 ? '5 can take a few seconds' : (difficulty === 4 ? '4 may take a moment' : 'try increasing it');
    updateTarget();
    if (!mining) resetState('Difficulty set to ' + difficulty + ' — press Mine.');
  });

  updateTarget();
})();
</script>
</body>
